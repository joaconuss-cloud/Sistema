<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scanner — Sistema Joaquin</title>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<style>
:root{
  --bg:#f8f6f0;        /* lienzo crema igual que TV */
  --bg2:#f0ede6;       /* superficies secundarias */
  --bg3:#e8e4db;       /* terciario */
  --bg-panel:#1a1d24;  /* paneles UI oscuros */
  --bg-panel2:#222631;
  --bg-panel3:#2a2f3d;
  --border:#d4cfc4;
  --border-ui:#2e3547;
  --text:#1a1a1a;
  --text-ui:#e2e8f0;
  --muted:#888070;
  --muted-ui:#64748b;
  --green:#7cb781;     /* vela alcista TV */
  --green-ui:#10d97e;  /* UI badges */
  --green2:#5a9e5f;
  --black:#000000;     /* vela bajista TV */
  --red-ui:#f43f5e;
  --amber:#f59e0b;
  --blue:#3b82f6;
  --purple:#a78bfa;
  --font:'JetBrains Mono','Fira Code',monospace;
}
*{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;}
body{background:var(--bg-panel);color:var(--text-ui);font-family:system-ui,sans-serif;display:flex;flex-direction:column;}

/* HEADER */
header{
  background:var(--bg-panel);border-bottom:1px solid var(--border-ui);
  height:46px;display:flex;align-items:center;justify-content:space-between;
  padding:0 14px;flex-shrink:0;
}
.logo{font-family:var(--font);font-size:10px;font-weight:700;color:var(--green-ui);
  background:rgba(16,217,126,0.08);border:1px solid rgba(16,217,126,0.18);
  padding:2px 8px;border-radius:4px;letter-spacing:.06em;}
.htitle{font-size:12px;font-weight:600;margin-left:10px;color:var(--text-ui);}
.hsub{font-family:var(--font);font-size:9px;color:var(--muted-ui);margin-top:1px;}
.hright{display:flex;align-items:center;gap:8px;}
.spill{display:flex;align-items:center;gap:4px;font-family:var(--font);font-size:9px;
  color:var(--muted-ui);background:var(--bg-panel2);border:1px solid var(--border-ui);border-radius:20px;padding:3px 8px;}
.sdot{width:5px;height:5px;border-radius:50%;background:var(--muted-ui);transition:all .3s;}
.sdot.ok{background:var(--green-ui);box-shadow:0 0 4px var(--green-ui);}
.sdot.spin{background:var(--amber);animation:blink 1s infinite;}
.sdot.err{background:var(--red-ui);}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.ny{font-family:var(--font);font-size:9px;color:var(--muted-ui);}
#notif-btn{font-family:var(--font);font-size:9px;color:var(--blue);background:none;
  border:1px solid rgba(59,130,246,.25);border-radius:4px;padding:2px 7px;cursor:pointer;display:none;}

.main{flex:1;display:flex;flex-direction:column;overflow:hidden;}

/* TOP BAR */
.topbar{
  background:var(--bg-panel);border-bottom:1px solid var(--border-ui);
  height:34px;display:flex;align-items:center;gap:8px;padding:0 12px;flex-shrink:0;
}
.sess{font-family:var(--font);font-size:10px;color:var(--muted-ui);display:flex;align-items:center;gap:5px;}
.sess.active{color:var(--green-ui);}
.sess-dot{width:5px;height:5px;border-radius:50%;background:currentColor;}
.divider{width:1px;height:16px;background:var(--border-ui);margin:0 2px;}
.tf-lbl{font-family:var(--font);font-size:9px;color:var(--muted-ui);margin-right:2px;}
.tf-btn{font-family:var(--font);font-size:9px;color:var(--muted-ui);background:none;
  border:1px solid var(--border-ui);border-radius:3px;padding:2px 7px;cursor:pointer;transition:all .15s;}
.tf-btn:hover{color:var(--text-ui);border-color:#4a5568;}
.tf-btn.active{color:var(--text-ui);background:var(--bg-panel3);border-color:var(--blue);}
.upd-info{margin-left:auto;font-family:var(--font);font-size:9px;color:#3a4560;}

/* PANELS */
.panels{flex:1;display:grid;grid-template-columns:1fr 1fr;overflow:hidden;}
.panel{display:flex;flex-direction:column;border-right:1px solid var(--border-ui);overflow:hidden;}
.panel:last-child{border-right:none;}

/* PANEL HEADER — dark strip */
.panel-header{
  background:var(--bg-panel);border-bottom:1px solid var(--border-ui);
  padding:5px 10px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;height:38px;
}
.p-ticker{font-family:var(--font);font-size:14px;font-weight:700;color:var(--text-ui);}
.p-price{font-family:var(--font);font-size:15px;font-weight:700;color:var(--text-ui);letter-spacing:-.2px;}
.p-chg{font-family:var(--font);font-size:10px;font-weight:600;}
.p-chg.up{color:var(--green-ui);}
.p-chg.dn{color:var(--red-ui);}
.bias-badge{font-family:var(--font);font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:3px;border:1px solid;}
.bias-badge.LONG{color:var(--green-ui);border-color:rgba(16,217,126,.3);background:rgba(16,217,126,.07);}
.bias-badge.SHORT{color:var(--red-ui);border-color:rgba(244,63,94,.3);background:rgba(244,63,94,.07);}
.bias-badge.WAIT{color:var(--muted-ui);border-color:var(--border-ui);background:transparent;}

/* PANEL BODY */
.panel-body{flex:1;display:grid;grid-template-columns:1fr 190px;overflow:hidden;}

/* CHART — fondo crema */
.chart-wrap{position:relative;overflow:hidden;background:var(--bg);}

/* CHECKLIST — dark */
.checklist{
  background:var(--bg-panel);border-left:1px solid var(--border-ui);
  padding:8px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;
}
.checklist::-webkit-scrollbar{width:2px;}
.checklist::-webkit-scrollbar-thumb{background:var(--border-ui);}
.cl-title{font-family:var(--font);font-size:8px;color:var(--muted-ui);
  letter-spacing:.12em;text-transform:uppercase;padding:0 2px;margin-bottom:1px;}

.cl-step{background:var(--bg-panel2);border:1px solid var(--border-ui);border-radius:5px;
  padding:6px 7px;transition:all .3s;position:relative;overflow:hidden;}
.cl-step::before{content:'';position:absolute;left:0;top:0;bottom:0;width:2px;border-radius:5px 0 0 5px;}
.cl-step.done{background:rgba(5,150,105,.06);border-color:rgba(5,150,105,.2);}
.cl-step.done::before{background:var(--green2);}
.cl-step.next{border-color:rgba(245,158,11,.3);background:rgba(245,158,11,.04);}
.cl-step.next::before{background:var(--amber);}
.cl-step.dim{opacity:.25;}

.cl-row{display:flex;align-items:center;gap:5px;}
.cl-num{width:14px;height:14px;border-radius:50%;border:1px solid var(--border-ui);
  display:flex;align-items:center;justify-content:center;
  font-family:var(--font);font-size:8px;color:var(--muted-ui);flex-shrink:0;}
.cl-step.done .cl-num{background:var(--green2);border-color:var(--green2);color:#fff;}
.cl-step.next .cl-num{border-color:var(--amber);color:var(--amber);}
.cl-name{font-family:var(--font);font-size:9px;color:var(--muted-ui);flex:1;line-height:1.2;}
.cl-step.done .cl-name,.cl-step.next .cl-name{color:var(--text-ui);}
.cl-detail{font-family:var(--font);font-size:8px;color:#3a4560;margin-top:2px;line-height:1.4;padding-left:19px;}
.cl-step.done .cl-detail{color:var(--muted-ui);}
.cl-step.next .cl-detail{color:rgba(245,158,11,.7);}

/* EXTRAS */
.cl-extras{background:var(--bg-panel2);border:1px solid var(--border-ui);border-radius:5px;padding:6px 7px;}
.cl-ext-title{font-family:var(--font);font-size:8px;color:var(--muted-ui);margin-bottom:4px;}
.cl-ext-row{display:flex;align-items:center;gap:4px;margin-bottom:2px;}
.cl-ext-dot{width:5px;height:5px;border-radius:1px;background:var(--border-ui);flex-shrink:0;transition:background .3s;}
.cl-ext-dot.on{background:var(--amber);}
.cl-ext-lbl{font-family:var(--font);font-size:8px;color:#3a4560;}
.cl-ext-dot.on+.cl-ext-lbl{color:var(--text-ui);}

/* SMT BAR */
.smt-bar{background:var(--bg-panel);border-top:1px solid var(--border-ui);
  height:26px;display:flex;align-items:center;padding:0 12px;gap:8px;flex-shrink:0;}
.smt-lbl{font-family:var(--font);font-size:9px;color:var(--muted-ui);}
.smt-badge{font-family:var(--font);font-size:9px;font-weight:700;padding:2px 8px;
  border-radius:10px;border:1px solid;}
.smt-badge.alin{color:var(--green-ui);border-color:rgba(16,217,126,.25);background:rgba(16,217,126,.07);}
.smt-badge.div{color:var(--purple);border-color:rgba(167,139,250,.25);background:rgba(167,139,250,.07);}
.smt-badge.neu{color:var(--muted-ui);border-color:var(--border-ui);}
.smt-detail{font-family:var(--font);font-size:9px;color:#3a4560;}

/* LOG */
.log-strip{background:var(--bg-panel);border-top:1px solid var(--border-ui);
  height:110px;display:flex;flex-direction:column;flex-shrink:0;}
.log-hdr{padding:3px 10px;border-bottom:1px solid var(--border-ui);
  display:flex;align-items:center;justify-content:space-between;height:24px;}
.log-title{font-size:10px;font-weight:600;color:var(--text-ui);}
.abadge{font-family:var(--font);font-size:8px;color:var(--amber);
  background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);
  border-radius:8px;padding:1px 5px;display:none;}
.abadge.show{display:inline;}
.clr-btn{font-family:var(--font);font-size:9px;color:var(--muted-ui);background:none;
  border:1px solid var(--border-ui);border-radius:3px;padding:1px 6px;cursor:pointer;}
.log-entries{flex:1;overflow-y:auto;padding:3px 8px;display:flex;flex-direction:column;gap:2px;}
.log-entries::-webkit-scrollbar{width:2px;}
.log-entries::-webkit-scrollbar-thumb{background:var(--border-ui);}
.entry{display:flex;align-items:baseline;gap:5px;font-size:10px;padding:2px 3px;border-radius:3px;}
.entry.setup{background:rgba(245,158,11,.06);}
.etime{font-family:var(--font);font-size:8px;color:#3a4560;flex-shrink:0;}
.emsg{line-height:1.3;color:var(--muted-ui);}
.emsg b{color:var(--amber);}
.entry.info .emsg{color:var(--blue);}

/* TOAST */
#toast{position:fixed;bottom:14px;right:14px;background:var(--bg-panel);border:1px solid var(--amber);
  border-radius:8px;padding:12px 14px;max-width:260px;z-index:999;
  transform:translateY(120%);transition:transform .35s cubic-bezier(.34,1.56,.64,1);}
#toast.show{transform:translateY(0);}
.t-tag{font-family:var(--font);font-size:8px;color:var(--amber);letter-spacing:.15em;margin-bottom:4px;}
.t-body{font-size:11px;font-weight:600;color:var(--text-ui);}
.t-score{font-family:var(--font);font-size:9px;color:var(--purple);margin-top:2px;}
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center">
    <div class="logo">IFVG</div>
    <div style="margin-left:10px">
      <div class="htitle">Scanner — Sistema Joaquin</div>
      <div class="hsub">NQ=F · ES=F · Yahoo Finance</div>
    </div>
  </div>
  <div class="hright">
    <button id="notif-btn" onclick="pedirNotif()">🔔 Alertas</button>
    <div class="spill">
      <div class="sdot" id="sdot"></div>
      <span id="stext" style="font-family:var(--font);font-size:9px">Iniciando</span>
    </div>
    <div class="ny" id="ny-clock">—</div>
  </div>
</header>

<div class="main">
  <div class="topbar">
    <div class="sess" id="sess-bar">
      <div class="sess-dot"></div>
      <span id="sess-txt">Calculando...</span>
    </div>
    <div class="divider"></div>
    <span class="tf-lbl">TF:</span>
    <button class="tf-btn" data-tf="1"  onclick="setTF('1')">M1</button>
    <button class="tf-btn active" data-tf="3"  onclick="setTF('3')">M3</button>
    <button class="tf-btn" data-tf="5"  onclick="setTF('5')">M5</button>
    <button class="tf-btn" data-tf="15" onclick="setTF('15')">M15</button>
    <button class="tf-btn" data-tf="60" onclick="setTF('60')">H1</button>
    <div class="upd-info" id="upd-info">—</div>
  </div>

  <div class="panels">
    <!-- NQ -->
    <div class="panel">
      <div class="panel-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="p-ticker">NQ</span>
          <span class="p-price" id="price-NQ">—</span>
          <span class="p-chg" id="chg-NQ">—</span>
        </div>
        <div class="bias-badge WAIT" id="bias-NQ">WAIT</div>
      </div>
      <div class="panel-body">
        <div class="chart-wrap" id="chart-NQ"></div>
        <div class="checklist" id="cl-NQ"></div>
      </div>
    </div>
    <!-- ES -->
    <div class="panel">
      <div class="panel-header">
        <div style="display:flex;align-items:center;gap:8px">
          <span class="p-ticker">ES</span>
          <span class="p-price" id="price-ES">—</span>
          <span class="p-chg" id="chg-ES">—</span>
        </div>
        <div class="bias-badge WAIT" id="bias-ES">WAIT</div>
      </div>
      <div class="panel-body">
        <div class="chart-wrap" id="chart-ES"></div>
        <div class="checklist" id="cl-ES"></div>
      </div>
    </div>
  </div>

  <div class="smt-bar">
    <span class="smt-lbl">SMT:</span>
    <div class="smt-badge neu" id="smt-badge">ANALIZANDO</div>
    <span class="smt-detail" id="smt-detail">Comparando NQ vs ES</span>
  </div>

  <div class="log-strip">
    <div class="log-hdr">
      <div style="display:flex;align-items:center;gap:5px">
        <span class="log-title">Alertas</span>
        <span class="abadge" id="abadge">0</span>
      </div>
      <button class="clr-btn" onclick="clearLog()">Limpiar</button>
    </div>
    <div class="log-entries" id="log-entries">
      <div class="entry"><span class="etime">—</span><span class="emsg">Iniciando scanner...</span></div>
    </div>
  </div>
</div>

<div id="toast">
  <div class="t-tag">SETUP DETECTADO</div>
  <div class="t-body" id="t-body">—</div>
  <div class="t-score" id="t-score">—</div>
</div>

<script>
// ═══════════════════════════════════════════════════════
// CONFIG
// ═══════════════════════════════════════════════════════
const SYMS   = { NQ:'NQ=F', ES:'ES=F' };
const FINNHUB_KEY = 'd85qmchr01qm56kscatgd85qmchr01qm56kscau0';
const OANDA_SYMS  = { NQ:'OANDA:NAS100_USD', ES:'OANDA:SPX500_USD' };
const PROXIES = [
  u => u,
  u => `https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u => `https://corsproxy.io/?${encodeURIComponent(u)}`
];
const YTF    = { '1':'1m','3':'3m','5':'5m','15':'15m','60':'1h' };
const YRange = { '1':'1d','3':'1d','5':'2d','15':'5d','60':'5d' };

let currentTF  = '3';
let proxyIdx   = 0;
let alertCount = 0;
let notifOk    = false;
let fetchTimer = null;

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const S = {};
for (const sym of Object.keys(SYMS)) {
  S[sym] = {
    price:null, prevClose:null, bias:'WAIT',
    steps:[false,false,false,false], score:0, smtExtra:false, lastAlert:0,
    candles:{},
    // detected zones (for chart drawing)
    obs:[],       // {top,bot,bull,tf,active} — active = price currently inside
    liqLines:[],  // {level,isBSL,tf}
    ifvgZones:[], // {top,bot,bull}
    // lightweight-charts references
    chart:null, candleSeries:null,
    priceLines:[],
    _lastCandleData: null,
    tickBuffer: {}  // {tfSecs: {candleStartTs: {o,h,l,c,ts}}}
  };
}

// ═══════════════════════════════════════════════════════
// INIT
// ═══════════════════════════════════════════════════════
window.addEventListener('load', () => {
  initCharts();
  for (const sym of Object.keys(SYMS)) renderChecklist(sym);
  clockTick();
  setInterval(clockTick, 15000);
  log('Scanner iniciado — NQ=F · ES=F · Yahoo Finance','sys');
  fetchAll();
  fetchTimer = setInterval(fetchAll, 60000); // Yahoo: solo velas históricas
  initFinnhubWS(); // Precio live sin delay via Finnhub WebSocket
  if ('Notification' in window) {
    if (Notification.permission==='granted') notifOk=true;
    else if (Notification.permission==='default') document.getElementById('notif-btn').style.display='inline';
  }
  window.addEventListener('resize', resizeCharts);
});

function resizeCharts() {
  for (const sym of Object.keys(SYMS)) {
    if (!S[sym].chart) continue;
    const wrap = document.getElementById(`chart-${sym}`);
    S[sym].chart.resize(wrap.clientWidth, wrap.clientHeight);
  }
}

// ═══════════════════════════════════════════════════════
// CHARTS — colores idénticos a TradingView del usuario
// ═══════════════════════════════════════════════════════
function initCharts() {
  for (const sym of Object.keys(SYMS)) {
    const wrap = document.getElementById(`chart-${sym}`);
    const chart = LightweightCharts.createChart(wrap, {
      width:  wrap.clientWidth,
      height: wrap.clientHeight,
      layout: {
        background: { color:'#f8f6f0' },  // crema exacto
        textColor:  '#888070',
      },
      grid: {
        vertLines: { color:'#e8e4db' },
        horzLines: { color:'#e8e4db' },
      },
      crosshair: { mode: LightweightCharts.CrosshairMode.Normal },
      rightPriceScale: { borderColor:'#d4cfc4' },
      timeScale: {
        borderColor: '#d4cfc4',
        timeVisible: true,
        secondsVisible: false,
        tickMarkFormatter: (time) => {
          // Mostrar en UTC-4 (New York)
          const d = new Date(time * 1000);
          const ny = new Date(d.toLocaleString('en-US', { timeZone: 'America/New_York' }));
          const h = ny.getHours().toString().padStart(2,'0');
          const m = ny.getMinutes().toString().padStart(2,'0');
          return `${h}:${m}`;
        },
      },
    });

    const candleSeries = chart.addCandlestickSeries({
      // Verde #7cb781 alcista, Negro #000000 bajista — exacto como TV del usuario
      upColor:         '#7cb781',
      downColor:       '#000000',
      borderUpColor:   '#7cb781',
      borderDownColor: '#000000',
      wickUpColor:     '#7cb781',
      wickDownColor:   '#000000',
    });

    S[sym].chart = chart;
    S[sym].candleSeries = candleSeries;
  }
}

// ═══════════════════════════════════════════════════════
// TF SWITCH
// ═══════════════════════════════════════════════════════
function setTF(tf) {
  currentTF = tf;
  document.querySelectorAll('.tf-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.tf === tf)
  );
  for (const sym of Object.keys(SYMS)) {
    S[sym]._lastCandleData = null; // forzar setData completo al cambiar TF
    if (S[sym].candles[tf]) {
      applyCandles(sym, S[sym].candles[tf]);
      drawZones(sym);
    }
  }
  clearTimeout(fetchTimer);
  fetchAll();
  fetchTimer = setInterval(fetchAll, 60000); // Yahoo: solo velas históricas
}


// ═══════════════════════════════════════════════════════
// FINNHUB WEBSOCKET — precio live sin delay
// NAS100_USD y SPX500_USD via OANDA
// ═══════════════════════════════════════════════════════
let finnhubWS = null;
let finnhubReconnectTimer = null;

function initFinnhubWS() {
  if (finnhubWS) { try { finnhubWS.close(); } catch(e){} }
  const ws = new WebSocket(`wss://ws.finnhub.io?token=${FINNHUB_KEY}`);
  finnhubWS = ws;

  ws.onopen = () => {
    log('Finnhub WS conectado — precio live NAS100 · SPX500','info');
    for (const oSym of Object.values(OANDA_SYMS)) {
      ws.send(JSON.stringify({ type:'subscribe', symbol: oSym }));
    }
  };

  ws.onmessage = (e) => {
    try {
      const msg = JSON.parse(e.data);
      if (msg.type !== 'trade' || !msg.data) return;
      for (const trade of msg.data) {
        const oSym = trade.s;
        const price = trade.p;
        const ts    = Math.floor(trade.t / 1000); // unix seconds
        // Map OANDA symbol → our sym key
        const sym = Object.keys(OANDA_SYMS).find(k => OANDA_SYMS[k] === oSym);
        if (!sym || !price) continue;
        // Actualizar precio live
        const prev = S[sym].prevClose;
        const chg  = prev ? (price - prev) / prev * 100 : 0;
        S[sym].price = price;
        updatePrice(sym, price, chg);
        // Acumular tick en buffer y actualizar chart
        processTick(sym, price, trade.t); // trade.t ya es ms
      }
    } catch(err){}
  };

  ws.onerror = () => {};
  ws.onclose = () => {
    log('Finnhub WS desconectado — reconectando en 5s...','sys');
    finnhubReconnectTimer = setTimeout(initFinnhubWS, 5000);
  };
}

// ─── TICK BUFFER — construye velas OHLC desde ticks de Finnhub ───
// Para cada TF: acumula ticks → OHLC propio, sin delay
// Al mergear con Yahoo: descartamos las últimas 15min de Yahoo y usamos las nuestras

function processTick(sym, price, tsMs) {
  const ts = Math.floor(tsMs / 1000); // unix segundos

  // Procesar para todos los TFs que usamos
  const tfsToProcess = [60, 180, 300, 900, 3600]; // M1, M3, M5, M15, H1
  for (const tfSecs of tfsToProcess) {
    const candleStart = Math.floor(ts / tfSecs) * tfSecs;
    const buf = S[sym].tickBuffer;
    if (!buf[tfSecs]) buf[tfSecs] = {};

    if (buf[tfSecs][candleStart]) {
      // Vela existente — actualizar
      const c = buf[tfSecs][candleStart];
      c.h = Math.max(c.h, price);
      c.l = Math.min(c.l, price);
      c.c = price;
    } else {
      // Nueva vela — buscar close de vela anterior como open
      const prevKeys = Object.keys(buf[tfSecs]).map(Number).sort((a,b)=>b-a);
      const prevClose = prevKeys.length > 0 ? buf[tfSecs][prevKeys[0]].c : price;
      buf[tfSecs][candleStart] = { time: candleStart, o: prevClose, h: price, l: price, c: price };

      // Limpiar velas viejas — guardar solo las últimas 20 (suficiente para cubrir el delay)
      const allKeys = Object.keys(buf[tfSecs]).map(Number).sort((a,b)=>a-b);
      if (allKeys.length > 20) {
        delete buf[tfSecs][allKeys[0]];
      }
    }
  }

  // Actualizar chart del TF actual en tiempo real
  updateChartFromBuffer(sym);
}

function updateChartFromBuffer(sym) {
  const tfSecs = {'1':60,'3':180,'5':300,'15':900,'60':3600}[currentTF] || 180;
  const buf = S[sym].tickBuffer[tfSecs];
  if (!buf) return;

  const candles = S[sym]._lastCandleData;
  if (!candles || candles.length === 0) return;

  const keys = Object.keys(buf).map(Number).sort((a,b)=>a-b);
  if (keys.length === 0) return;

  const latestKey  = keys[keys.length - 1];
  const liveCandle = buf[latestKey];
  const lastInChart = candles[candles.length - 1];

  if (liveCandle.time === lastInChart.time) {
    // Actualizar la última vela en tiempo real
    try {
      S[sym].candleSeries.update({
        time:  liveCandle.time,
        open:  +liveCandle.o,
        high:  +liveCandle.h,
        low:   +liveCandle.l,
        close: +liveCandle.c
      });
      // Sincronizar en _lastCandleData
      lastInChart.high  = Math.max(lastInChart.high,  liveCandle.h);
      lastInChart.low   = Math.min(lastInChart.low,   liveCandle.l);
      lastInChart.close = liveCandle.c;
    } catch(e) {}
  } else if (liveCandle.time > lastInChart.time) {
    // Nueva vela — agregar
    const newC = { time:liveCandle.time, open:+liveCandle.o, high:+liveCandle.h, low:+liveCandle.l, close:+liveCandle.c };
    try {
      S[sym].candleSeries.update(newC);
      candles.push({ time:newC.time, o:newC.open, h:newC.high, l:newC.low, c:newC.close });
    } catch(e) {}
  }
  // Si liveCandle.time < lastInChart.time → ignorar, es una vela vieja del buffer
}

// Al mergear Yahoo con buffer de Finnhub:
// Descartamos las últimas 15min de Yahoo y las reemplazamos con nuestras velas reales
function mergeYahooWithBuffer(sym, yahooCandles, tfSecs) {
  if (!yahooCandles || yahooCandles.length === 0) return [];
  const nowSecs    = Math.floor(Date.now() / 1000);
  const delayWin   = 15 * 60; // 15 min delay de Yahoo

  // Mapa base con todas las velas de Yahoo
  const yahooMap = {};
  for (const c of yahooCandles) yahooMap[c.time] = { ...c };

  // Última vela de Yahoo → precio de referencia para placeholders
  const lastYahoo    = yahooCandles[yahooCandles.length - 1];
  const lastYahooTs  = lastYahoo.time;
  const lastYahooP   = lastYahoo.c;

  // Generar placeholders desde última vela de Yahoo hasta ahora
  // Estas velas "planas" representan el gap del delay
  // Se van a ir reemplazando: por Yahoo cuando llegue, por Finnhub tick a tick
  const gapStart = lastYahooTs + tfSecs;
  const gapEnd   = Math.floor(nowSecs / tfSecs) * tfSecs;
  for (let t = gapStart; t <= gapEnd; t += tfSecs) {
    if (!yahooMap[t]) {
      // Placeholder: vela plana con el último precio conocido
      yahooMap[t] = { time: t, o: lastYahooP, h: lastYahooP, l: lastYahooP, c: lastYahooP, isPlaceholder: true };
    }
  }

  // Aplicar buffer de Finnhub encima:
  // Reemplaza placeholders y actualiza velas recientes con datos reales
  const buf = S[sym].tickBuffer[tfSecs];
  if (buf) {
    const liveKeys = Object.keys(buf).map(Number).sort((a,b)=>a-b);
    for (const k of liveKeys) {
      const lc = buf[k];
      const t  = lc.time;
      if (yahooMap[t]) {
        if (yahooMap[t].isPlaceholder) {
          // Reemplazar placeholder con dato real de Finnhub
          yahooMap[t] = { time: t, o: lc.o, h: lc.h, l: lc.l, c: lc.c };
        } else {
          // Vela de Yahoo ya existente — actualizar con precio live
          yahooMap[t].h = Math.max(yahooMap[t].h, lc.h);
          yahooMap[t].l = Math.min(yahooMap[t].l, lc.l);
          yahooMap[t].c = lc.c;
        }
      } else {
        // Vela totalmente nueva (más allá del gap) — agregar
        yahooMap[t] = { time: t, o: lc.o, h: lc.h, l: lc.l, c: lc.c };
      }
    }
  }

  return Object.values(yahooMap)
    .sort((a,b) => a.time - b.time)
    .map(c => ({ time:c.time, o:c.o, h:c.h, l:c.l, c:c.c })); // limpiar isPlaceholder
}

// ═══════════════════════════════════════════════════════
// FETCH
// ═══════════════════════════════════════════════════════
async function yahooFetch(symbol, interval, range) {
  const base = `https://query1.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(symbol)}?interval=${interval}&range=${range}&includePrePost=false`;
  for (let i=0;i<PROXIES.length;i++) {
    const idx = (proxyIdx+i)%PROXIES.length;
    try {
      const res = await fetch(PROXIES[idx](base),{
        headers:{'Accept':'application/json'},
        signal:AbortSignal.timeout(10000)
      });
      if (!res.ok) continue;
      const data = await res.json();
      const result = data?.chart?.result?.[0];
      if (!result||!result.timestamp||result.timestamp.length<3) continue;
      proxyIdx = idx;
      return result;
    } catch(e){ continue; }
  }
  throw new Error('Sin respuesta de Yahoo');
}

function parseCandles(result) {
  const ts = result.timestamp||[];
  const q  = result.indicators?.quote?.[0]||{};
  return ts.map((t,i)=>({
    time:t,
    o:q.open?.[i], h:q.high?.[i], l:q.low?.[i], c:q.close?.[i]
  })).filter(c=>c.o!=null&&c.h!=null&&c.l!=null&&c.c!=null&&c.h>0&&c.l>0);
}

async function fetchAll() {
  setStatus('spin','Actualizando...');
  let ok=0;
  for (const sym of Object.keys(SYMS)) {
    try { await fetchSym(sym); ok++; }
    catch(e) { log(`Error ${sym}: ${e.message}`,'sys'); }
  }
  if (ok>0) {
    setStatus('ok','Conectado');
    document.getElementById('upd-info').textContent =
      'Upd '+new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
    analyzeSMT();
  } else {
    setStatus('err','Sin datos');
    log('No se pudo conectar. Reintentando en 30s...','sys');
  }
}

async function fetchSym(sym) {
  const yahoo = SYMS[sym];

  // Siempre traemos H1 y M5 para bias
  const [h1r, m5r] = await Promise.all([
    yahooFetch(yahoo,'1h','5d'),
    yahooFetch(yahoo,'5m','2d')
  ]);

  // M3 con fallback a M5
  let m3r=null;
  try {
    m3r = await yahooFetch(yahoo,'3m','1d');
    if (!m3r||m3r.timestamp.length<5) m3r=null;
  } catch(e){}
  if (!m3r) {
    m3r = m5r;
    log(`${sym}: M3 no disponible → usando M5`,'sys');
  }

  // TF del chart actual
  const dispInterval = YTF[currentTF]||'3m';
  const dispRange    = YRange[currentTF]||'1d';
  let dispR=null;
  try { dispR = await yahooFetch(yahoo, dispInterval, dispRange); } catch(e){}

  // Parse
  const h1 = parseCandles(h1r);
  const m5 = parseCandles(m5r);
  const m3 = parseCandles(m3r);

  // Mergear Yahoo con buffer de Finnhub para eliminar delay
  const rawH1 = h1;
  const rawM5 = mergeYahooWithBuffer(sym, m5, 300);
  const rawM3 = mergeYahooWithBuffer(sym, m3, 180);

  S[sym].candles['60'] = rawH1;
  S[sym].candles['5']  = rawM5;
  S[sym].candles['3']  = rawM3;
  if (dispR) {
    const tfSecs = {'1':60,'3':180,'5':300,'15':900,'60':3600}[currentTF]||180;
    S[sym].candles[currentTF] = mergeYahooWithBuffer(sym, parseCandles(dispR), tfSecs);
  }

  // Precio
  const meta  = h1r.meta;
  const price = meta.regularMarketPrice;
  const prev  = meta.chartPreviousClose||meta.previousClose;
  const chg   = prev?(price-prev)/prev*100:0;
  S[sym].price=price; S[sym].prevClose=prev;
  updatePrice(sym,price,chg);

  // Análisis (con candles mergeadas de Finnhub)
  analyze(sym, rawH1, rawM5, rawM3);

  // Chart
  const chartCandles = S[sym].candles[currentTF] || m3;
  applyCandles(sym, chartCandles);
  drawZones(sym);
  renderChecklist(sym);
}

// ═══════════════════════════════════════════════════════
// ANÁLISIS
// ═══════════════════════════════════════════════════════
function analyze(sym, h1, m5, m3) {
  S[sym].obs=[]; S[sym].liqLines=[]; S[sym].ifvgZones=[];
  const steps=[false,false,false,false];
  let score=0, bias='WAIT';

  if (h1.length<12||m5.length<12) { finalize(sym,steps,score,bias); return; }

  // PASO 1: Bias H1 + M5 alineados
  const bH1 = calcBias(h1);
  const bM5 = calcBias(m5);
  const alin = bH1!=='NEUTRAL'&&bH1===bM5;
  steps[0] = alin;
  bias = alin?bH1:'WAIT';

  if (alin) {
    // Detectar OBs en todos los TFs
    detectOBs(sym, h1, 'H1', bias);
    detectOBs(sym, m5, 'M5', bias);
    if (m3.length>5) detectOBs(sym, m3, 'M3', bias);

    // Marcar cuáles tienen precio tocándolos ahora
    const curPrice = S[sym].price;
    if (curPrice) {
      for (const ob of S[sym].obs) {
        ob.active = curPrice >= ob.bot && curPrice <= ob.top;
      }
    }

    // PASO 2: al menos un OB válido existe
    steps[1] = S[sym].obs.some(o=>o.valid);

    if (steps[1]) {
      // PASO 3: Toma de liquidez en M3 (o M5 fallback)
      const liqSrc = m3.length>=5?m3:m5;
      const liq = detectLiquidity(liqSrc, bias);
      steps[2] = liq.found;
      if (liq.found) {
        S[sym].liqLines.push({ level:liq.level, isBSL:liq.isBSL, tf:liq.tf });
      }

      if (steps[2]) {
        // PASO 4: IFVG en leg post-liquidez
        const ifvg = detectIFVG(liqSrc, bias);
        steps[3] = ifvg.found;
        if (ifvg.found) {
          S[sym].ifvgZones.push({ top:ifvg.top, bot:ifvg.bot, bull:ifvg.bull });
          // Extras
          if (detectSingularIFVG(m5,bias))      score++; // 1
          if (detectPD(h1,bias,S[sym].price))   score++; // 2
          // 3: SMT → en analyzeSMT()
          if (detectMomentum(liqSrc,bias))       score++; // 4
        }
      }
    }
  }

  finalize(sym,steps,score,bias);

  if (steps[3]&&Date.now()-S[sym].lastAlert>5*60*1000) {
    S[sym].lastAlert=Date.now();
    fireAlert(sym,bias,score);
  }
}

function finalize(sym,steps,score,bias) {
  S[sym].steps=steps; S[sym].score=score; S[sym].bias=bias;
  const b=document.getElementById(`bias-${sym}`);
  b.textContent=bias; b.className=`bias-badge ${bias}`;
}

// ─── BIAS ────────────────────────────────────────────
function calcBias(c) {
  if (c.length<14) return 'NEUTRAL';
  const n=c.slice(-28);
  // Comparamos mitad reciente vs mitad anterior
  const H1=Math.max(...n.slice(-7).map(x=>x.h));
  const H2=Math.max(...n.slice(-14,-7).map(x=>x.h));
  const L1=Math.min(...n.slice(-7).map(x=>x.l));
  const L2=Math.min(...n.slice(-14,-7).map(x=>x.l));
  if (H1>H2&&L1>L2) return 'LONG';
  if (H1<H2&&L1<L2) return 'SHORT';
  return 'NEUTRAL';
}

// ─── OBs ─────────────────────────────────────────────
// OB = PRIMERA vela de un grupo FVG (si hay varios FVGs seguidos, solo la primera)
// FVG alcista: high[i-2] < low[i]    → brecha entre mecha sup de v1 y mecha inf de v3
// FVG bajista: low[i-2]  > high[i]   → brecha entre mecha inf de v1 y mecha sup de v3
// OB = vela completa (high[i-2], low[i-2]) — mecha a mecha
// Primera del GRUPO: el FVG anterior (i-3 vs i-1) NO era FVG
function detectOBs(sym, candles, tfLabel, bias) {
  if (candles.length<5) return;
  const n = candles.slice(-60);
  for (let i=2; i<n.length; i++) {
    const v1=n[i-2], v3=n[i];
    const bullFVG = v1.h < v3.l;  // gap alcista: high de v1 < low de v3
    const bearFVG = v1.l > v3.h;  // gap bajista: low de v1 > high de v3

    // ¿Es PRIMERA del grupo? El par anterior NO debe ser FVG
    const prevBull = i>=3 ? n[i-3].h < n[i-1].l : false;
    const prevBear = i>=3 ? n[i-3].l > n[i-1].h : false;
    const isFirstOfGroup = (bullFVG&&!prevBull) || (bearFVG&&!prevBear);
    if (!isFirstOfGroup) continue;

    // Validar según bias
    if (bullFVG&&bias!=='LONG')  continue;
    if (bearFVG&&bias!=='SHORT') continue;

    // Verificar que no fue invalidado (ninguna vela posterior cerró con cuerpo adentro)
    let valid=true;
    for (let j=i+1; j<n.length; j++) {
      const cv=n[j];
      if (bullFVG && cv.c<v1.l) { valid=false; break; } // cuerpo cierra debajo del bot del OB bajista
      if (bearFVG && cv.c>v1.h) { valid=false; break; } // cuerpo cierra arriba del top del OB alcista
    }
    if (!valid) continue;

    S[sym].obs.push({
      top:v1.h, bot:v1.l,
      bull:!!bullFVG,
      tf:tfLabel,
      valid:true,
      active:false,
      time:v1.time
    });
  }
}

// ─── LIQUIDEZ ─────────────────────────────────────────
// BSL: mecha > swing high, cuerpo cierra debajo → SHORT
// SSL: mecha < swing low,  cuerpo cierra arriba → LONG
// TF mínimo M3 (no M1)
function detectLiquidity(candles, bias) {
  if (candles.length<6) return {found:false};
  const n=candles.slice(-40);

  // Detectar swing points
  const swingHighs=[], swingLows=[];
  for (let i=1;i<n.length-1;i++) {
    if (n[i].h>n[i-1].h&&n[i].h>n[i+1].h) swingHighs.push({idx:i,level:n[i].h});
    if (n[i].l<n[i-1].l&&n[i].l<n[i+1].l) swingLows.push({idx:i,level:n[i].l});
  }

  // Buscar desde atrás la toma más reciente válida
  for (let i=n.length-1; i>=2; i--) {
    const cv=n[i];
    if (bias==='LONG' && swingLows.length>0) {
      // SSL: buscar swing low anterior a esta vela
      for (let si=swingLows.length-1; si>=0; si--) {
        const sl=swingLows[si];
        if (sl.idx>=i) continue; // swing debe ser anterior
        // Mecha barre el low, cuerpo cierra arriba
        if (cv.l<sl.level&&cv.c>sl.level) {
          // Verificar que no fue invalidada antes (ninguna vela entre el swing y esta cerró debajo)
          let invalid=false;
          for (let k=sl.idx+1;k<i;k++) { if(n[k].c<sl.level){invalid=true;break;} }
          if (!invalid) return {found:true,level:sl.level,isBSL:false,tf:'M3'};
        }
      }
    }
    if (bias==='SHORT' && swingHighs.length>0) {
      // BSL: mecha barre high, cuerpo cierra debajo
      for (let si=swingHighs.length-1;si>=0;si--) {
        const sh=swingHighs[si];
        if (sh.idx>=i) continue;
        if (cv.h>sh.level&&cv.c<sh.level) {
          let invalid=false;
          for (let k=sh.idx+1;k<i;k++) { if(n[k].c>sh.level){invalid=true;break;} }
          if (!invalid) return {found:true,level:sh.level,isBSL:true,tf:'M3'};
        }
      }
    }
  }
  return {found:false};
}

// ─── IFVG ─────────────────────────────────────────────
// FVG atravesado por vela de momentum (cuerpo > 60% del rango)
// IFVG alcista: había FVG (v1.l>v3.h) y vela momentum cierra por encima
// IFVG bajista: había FVG (v1.h<v3.l) y vela momentum cierra por debajo
function detectIFVG(candles, bias) {
  if (candles.length<5) return {found:false};
  const n=candles.slice(-30);
  for (let i=2;i<n.length;i++) {
    const [v1,v2,v3]=[n[i-2],n[i-1],n[i]];
    const body=Math.abs(v2.c-v2.o), range=v2.h-v2.l;
    const isMomentum = range>0&&body/range>0.6;
    if (!isMomentum) continue;
    // IFVG alcista: gap entre low[v1] y high[v3], momentum cierra arriba
    if (bias==='LONG'&&v1.l>v3.h&&v2.c>v1.l) {
      return {found:true,top:v1.l,bot:v3.h,bull:true};
    }
    // IFVG bajista: gap entre high[v1] y low[v3], momentum cierra abajo
    if (bias==='SHORT'&&v1.h<v3.l&&v2.c<v1.h) {
      return {found:true,top:v3.l,bot:v1.h,bull:false};
    }
  }
  return {found:false};
}

// ─── EXTRAS ───────────────────────────────────────────
function detectSingularIFVG(c,bias) {
  const n=c.slice(-40); let count=0;
  for(let i=2;i<n.length;i++){
    const [v1,v2,v3]=[n[i-2],n[i-1],n[i]];
    const b=Math.abs(v2.c-v2.o),r=v2.h-v2.l,m=r>0&&b/r>0.6;
    if(bias==='LONG'&&v1.l>v3.h&&m)  count++;
    if(bias==='SHORT'&&v1.h<v3.l&&m) count++;
  }
  return count===1;
}
function detectPD(c,bias,price) {
  if(!price||c.length<10) return false;
  const n=c.slice(-20);
  const hi=Math.max(...n.map(x=>x.h)), lo=Math.min(...n.map(x=>x.l));
  const mid=(hi+lo)/2;
  return bias==='LONG'?price<mid:price>mid;
}
function detectMomentum(c,bias) {
  if(!c.length) return false;
  const last=c[c.length-1];
  const body=Math.abs(last.c-last.o), range=last.h-last.l;
  if(!range) return false;
  const dir=(bias==='LONG'&&last.c>last.o)||(bias==='SHORT'&&last.c<last.o);
  return dir&&body/range>0.70;
}

// ═══════════════════════════════════════════════════════
// CHART DRAWING
// ═══════════════════════════════════════════════════════
function applyCandles(sym, candles) {
  if (!candles||!candles.length) return;
  const series = S[sym].candleSeries;
  // Normalizar: asegurar que todos los campos son numéricos y eliminar duplicados
  const seen = new Set();
  const data = candles
    .map(c=>({ time:c.time, open:+(c.o||c.open), high:+(c.h||c.high), low:+(c.l||c.low), close:+(c.c||c.close) }))
    .filter(c => { if (seen.has(c.time)) return false; seen.add(c.time); return c.open>0 && c.high>0; })
    .sort((a,b)=>a.time-b.time);
  if (!data.length) return;

  const prevData = S[sym]._lastCandleData;
  const prevLast = prevData?.length ? prevData[prevData.length-1].time : null;
  const newLast  = data[data.length-1].time;

  if (!prevLast) {
    // Primera carga
    series.setData(data);
  } else if (newLast > prevLast) {
    // Hay velas nuevas — verificar si hay cambios en el medio (placeholders rellenados)
    // Si el conteo cambió o hay timestamps intermedios nuevos → setData completo
    const prevCount = prevData.length;
    const newCount  = data.length;
    if (newCount > prevCount + 1) {
      // Múltiples velas nuevas (incluye placeholders rellenados) → setData
      series.setData(data);
    } else {
      // Solo una vela nueva al final → update
      const newOnes = data.filter(d => d.time > prevLast);
      for (const c of newOnes) { try { series.update(c); } catch(e) { series.setData(data); break; } }
    }
  } else if (newLast === prevLast) {
    // Misma última vela — update precio live
    try { series.update(data[data.length-1]); } catch(e) {}
  } else {
    // newLast < prevLast — datos históricos cambiaron → setData completo
    series.setData(data);
  }

  S[sym]._lastCandleData = data;
}

function drawZones(sym) {
  const series = S[sym].candleSeries;
  if (!series) return;

  // Limpiar líneas anteriores
  for (const pl of S[sym].priceLines) {
    try { series.removePriceLine(pl); } catch(e){}
  }
  S[sym].priceLines=[];

  const add=(price,color,style,width,title,axisLabel)=>{
    const pl=series.createPriceLine({
      price, color, lineWidth:width,
      lineStyle:style,
      axisLabelVisible:!!axisLabel,
      title:title||''
    });
    S[sym].priceLines.push(pl);
    return pl;
  };
  const Solid  = LightweightCharts.LineStyle.Solid;
  const Dashed = LightweightCharts.LineStyle.Dashed;

  // ── OBs ──
  // Alcista: fondo verde claro, bajista: fondo gris/negro
  for (const ob of S[sym].obs) {
    if (!ob.valid) continue;
    const col   = ob.bull ? 'rgba(124,183,129,0.7)' : 'rgba(80,80,80,0.7)';
    const colBg = ob.bull ? 'rgba(124,183,129,0.15)' : 'rgba(80,80,80,0.12)';
    const label = `OB${ob.bull?'▲':'▼'} ${ob.tf}${ob.active?' ●':''}`;
    add(ob.top, col, Solid, ob.active?2:1, label, true);
    add(ob.bot, colBg, Dashed, 1, '', false);
  }

  // ── LIQUIDEZ (BSL/SSL) ──
  for (const liq of S[sym].liqLines) {
    const col = liq.isBSL ? 'rgba(167,139,250,0.85)' : 'rgba(59,130,246,0.85)';
    add(liq.level, col, Dashed, 1, liq.isBSL?'BSL':'SSL', true);
  }

  // ── IFVG ──
  for (const ifvg of S[sym].ifvgZones) {
    const col = 'rgba(245,158,11,0.9)';
    add(ifvg.top, col, Solid, 2, `IFVG ${ifvg.bull?'▲':'▼'}`, true);
    add(ifvg.bot, 'rgba(245,158,11,0.4)', Dashed, 1, '', false);
  }
}

// ═══════════════════════════════════════════════════════
// CHECKLIST
// ═══════════════════════════════════════════════════════
function renderChecklist(sym) {
  const st = S[sym];
  const cont = document.getElementById(`cl-${sym}`);
  if (!cont) return;

  const stepsDef = [
    {
      name:'H1 + M5 alineados',
      detail: () => st.bias!=='WAIT'?`Bias: ${st.bias}`:'Sin dirección clara'
    },
    {
      name:'OB válido',
      detail: () => {
        const valid=st.obs.filter(o=>o.valid);
        if (!valid.length) return 'Sin OB detectado';
        const active=valid.filter(o=>o.active);
        return active.length
          ? `${active.length} OB activo(s) — ${active.map(o=>o.tf).join(', ')}`
          : `${valid.length} OB válido(s) — ${valid.map(o=>o.tf).join(', ')}`;
      }
    },
    {
      name:'Toma de liquidez',
      detail: () => st.liqLines.length
        ? `${st.liqLines[0].isBSL?'BSL':'SSL'} en ${st.liqLines[0].tf}`
        : 'Sin toma detectada'
    },
    {
      name:'IFVG formado',
      detail: () => st.ifvgZones.length
        ? `Zona ${st.ifvgZones[0].bull?'alcista':'bajista'} — Entrada aquí`
        : 'Sin IFVG aún'
    }
  ];

  const extrasLabels=['IFVG singular','Premium/Discount','SMT (NQ vs ES)','Vela momentum'];
  const extrasVals=[
    st.steps[3]&&detectSingularIFVG(st.candles['5']||[],st.bias),
    st.steps[3]&&detectPD(st.candles['60']||[],st.bias,st.price),
    st.smtExtra||false,
    st.steps[3]&&detectMomentum(st.candles['3']||st.candles['5']||[],st.bias)
  ];

  let html=`<div class="cl-title">Checklist</div>`;
  stepsDef.forEach((def,i)=>{
    const done=st.steps[i];
    const prevOk=i===0||st.steps[i-1];
    const isNext=!done&&prevOk;
    const cls=done?'done':isNext?'next':'dim';
    html+=`<div class="cl-step ${cls}">
      <div class="cl-row">
        <div class="cl-num">${done?'✓':i+1}</div>
        <div class="cl-name">${def.name}</div>
      </div>
      <div class="cl-detail">${def.detail()}</div>
    </div>`;
  });

  // Extras
  const totalScore=st.score+(st.smtExtra?0:0); // SMT ya incluido en score
  html+=`<div class="cl-extras">
    <div class="cl-ext-title">Extras — ${st.score}/4</div>`;
  extrasLabels.forEach((lbl,i)=>{
    html+=`<div class="cl-ext-row">
      <div class="cl-ext-dot${extrasVals[i]?' on':''}"></div>
      <div class="cl-ext-lbl">${lbl}</div>
    </div>`;
  });
  html+=`</div>`;
  cont.innerHTML=html;
}

// ═══════════════════════════════════════════════════════
// SMT
// ═══════════════════════════════════════════════════════
function analyzeSMT() {
  const bNQ=S.NQ.bias, bES=S.ES.bias;
  const badge=document.getElementById('smt-badge');
  const detail=document.getElementById('smt-detail');
  let smtOn=false;
  if (bNQ!=='WAIT'&&bES!=='WAIT'&&bNQ===bES) {
    badge.className='smt-badge alin'; badge.textContent='ALINEADOS';
    detail.textContent=`NQ ${bNQ} · ES ${bES}`;
  } else if (bNQ!=='WAIT'&&bES!=='WAIT'&&bNQ!==bES) {
    badge.className='smt-badge div'; badge.textContent='SMT ✓ +1';
    detail.textContent=`Divergencia NQ ${bNQ} vs ES ${bES}`;
    smtOn=true;
  } else {
    badge.className='smt-badge neu'; badge.textContent='SIN BIAS';
    detail.textContent='Esperando dirección en ambos';
  }
  for (const sym of Object.keys(SYMS)) {
    S[sym].smtExtra=smtOn&&S[sym].steps[3];
    if (smtOn&&S[sym].steps[3]) S[sym].score=Math.min(4,S[sym].score+1);
    renderChecklist(sym);
  }
}

// ═══════════════════════════════════════════════════════
// UI
// ═══════════════════════════════════════════════════════
function updatePrice(sym,price,chg) {
  if (!price) return;
  const fmt=new Intl.NumberFormat('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
  document.getElementById(`price-${sym}`).textContent=fmt.format(price);
  const el=document.getElementById(`chg-${sym}`);
  el.textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';
  el.className=`p-chg ${chg>=0?'up':'dn'}`;
}

function fireAlert(sym,bias,score) {
  const msg=`${sym} — Setup BASE completo (${bias})`;
  const extra=`Score: ${score}/4 ${score>=3?'— Alta convicción':score>=2?'— Media':'— Baja'}`;
  log(msg,'setup',extra);
  document.getElementById('t-body').textContent=msg;
  document.getElementById('t-score').textContent=extra;
  const t=document.getElementById('toast');
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),7000);
  beep();
  if (notifOk) new Notification(`⚡ Setup ${sym}`,{body:`${bias} — Pasos 1-4 · Score ${score}/4`});
}

function beep() {
  try {
    const ctx=new(window.AudioContext||window.webkitAudioContext)();
    [[880,0],[1100,.13],[880,.26]].forEach(([f,d])=>{
      const o=ctx.createOscillator(),g=ctx.createGain();
      o.connect(g);g.connect(ctx.destination);
      o.frequency.value=f;
      g.gain.setValueAtTime(.2,ctx.currentTime+d);
      g.gain.exponentialRampToValueAtTime(.001,ctx.currentTime+d+.12);
      o.start(ctx.currentTime+d);o.stop(ctx.currentTime+d+.13);
    });
  } catch(e){}
}

function log(msg,type='sys',extra='') {
  const cont=document.getElementById('log-entries');
  if (cont.children.length===1&&cont.querySelector('.emsg')?.textContent.includes('Iniciando')) cont.innerHTML='';
  const el=document.createElement('div');
  el.className=`entry ${type}`;
  const time=new Date().toLocaleTimeString('es-AR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
  el.innerHTML=`<span class="etime">${time}</span><span class="emsg">${
    type==='setup'?`<b>${msg}</b> — ${extra}`:msg+(extra?' — '+extra:'')
  }</span>`;
  cont.insertBefore(el,cont.firstChild);
  if (type==='setup') {
    alertCount++;
    const ab=document.getElementById('abadge');
    ab.textContent=alertCount; ab.classList.add('show');
  }
}
function clearLog(){
  document.getElementById('log-entries').innerHTML='<div class="entry"><span class="etime">—</span><span class="emsg">Log limpiado</span></div>';
  alertCount=0; document.getElementById('abadge').classList.remove('show');
}
function setStatus(s,txt){
  document.getElementById('sdot').className=`sdot ${s}`;
  document.getElementById('stext').textContent=txt;
}
function pedirNotif(){
  Notification.requestPermission().then(p=>{
    notifOk=p==='granted';
    document.getElementById('notif-btn').style.display='none';
    log('Notificaciones browser activadas','sys');
  });
}
